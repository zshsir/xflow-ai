version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: xflow-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-xflow_db}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地访问，通过 docker 网络对外
    volumes:
      - ./mysql/data:/var/lib/mysql
      - ./mysql/conf:/etc/mysql/conf.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - xflow-net

  backend:
    build:
      context: ./my-admin-backend
      dockerfile: Dockerfile
    image: xflow-backend:latest
    container_name: xflow-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-xflow_db}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: 86400000
      TZ: Asia/Shanghai
    expose:
      - "8080"
    volumes:
      - ./logs/backend:/app/logs
    networks:
      - xflow-net

  frontend:
    build:
      context: ./my-admin-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    image: xflow-frontend:latest
    container_name: xflow-frontend
    restart: always
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - xflow-net

  nginx:
    image: nginx:alpine
    container_name: xflow-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - xflow-net

networks:
  xflow-net:
    driver: bridge
